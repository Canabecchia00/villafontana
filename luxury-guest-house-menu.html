<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Fontana · Extra Service</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyAvTB_64X3ice0zhN-0GjnYswQLE5W23Cc",
  authDomain: "villa-f.firebaseapp.com",
  databaseURL: "https://villa-f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "villa-f"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window._fbDB=db; window._fbRef=ref; window._fbPush=push;
window._fbOnValue=onValue; window._fbUpdate=update;
window._fbReady=true;
window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
:root{
  --teal:        #4E9B8F;
  --teal-dark:   #3A7A70;
  --teal-light:  #7ABDB5;
  --teal-pale:   rgba(78,155,143,0.09);
  --teal-border: rgba(78,155,143,0.25);
  --charcoal:    #2C3035;
  --charcoal2:   #1E2226;
  --white:       #FFFFFF;
  --off-white:   #F8F6F2;
  --cream:       #F2EDE4;
  --divider:     #E0D8CC;
  --gray:        #888078;
  --mid:         #555048;
  --gold:        #8B7355;
  --shadow:      rgba(44,48,53,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lato',sans-serif;background:var(--off-white);color:var(--charcoal);min-height:100vh;overflow-x:hidden;}

/* ══════════════════════════
   SPLASH
══════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:1000;
  background:var(--charcoal2);
  background-image:url('http://www.villafontanaaglianoterme.it/wp-content/uploads/2021/06/img-1200x630-1.jpg');
  background-size:cover;background-position:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;
  transition:opacity 1s ease;
}
#splash::before{content:'';position:absolute;inset:0;background:rgba(28,34,38,0.78);z-index:0;pointer-events:none;}
#splash>*{position:relative;z-index:1;}
#splash.fade-out{opacity:0;pointer-events:none;}

/* Logo block */
.splash-brand{text-align:center;display:flex;flex-direction:column;align-items:center;gap:0}
.splash-ornament{width:90px;margin-bottom:0.6rem;filter:brightness(0) saturate(100%) invert(60%) sepia(40%) saturate(500%) hue-rotate(130deg) brightness(110%);}
.splash-logo-rule{display:flex;align-items:center;gap:1rem;margin:0.2rem 0;}
.splash-logo-rule::before,.splash-logo-rule::after{content:'';flex:1;height:1px;background:var(--teal-light);width:28px;}
.splash-wordmark{font-family:'Lato',sans-serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:900;letter-spacing:0.35em;text-transform:uppercase;color:var(--white);}
.splash-tagline{font-size:0.58rem;letter-spacing:0.3rem;text-transform:uppercase;color:var(--teal-light);margin-top:0.15rem;}
.splash-stars{color:var(--teal-light);font-size:0.75rem;letter-spacing:0.2rem;margin-top:0.4rem;}
.splash-service-badge{
  margin-top:1rem;
  background:var(--teal);color:var(--white);
  font-size:0.58rem;letter-spacing:0.28rem;text-transform:uppercase;font-weight:700;
  padding:0.35rem 1.2rem;
}

.checkin-card{
  background:rgba(255,255,255,0.06);
  border:1px solid var(--teal-border);
  padding:2.2rem 2.8rem;width:min(420px,90vw);
  backdrop-filter:blur(10px);
}
.checkin-card h2{
  font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:400;font-style:italic;
  color:var(--teal-light);text-align:center;margin-bottom:1.8rem;
}
.field-group{margin-bottom:1.1rem;}
.field-group label{display:block;font-size:0.58rem;letter-spacing:0.22rem;text-transform:uppercase;color:var(--teal-light);margin-bottom:0.45rem;font-weight:700;}
.field-group select,.field-group input{
  width:100%;background:rgba(255,255,255,0.07);border:none;
  border-bottom:1px solid rgba(122,189,181,0.35);
  padding:0.65rem 0.1rem;color:var(--white);
  font-family:'Lato',sans-serif;font-size:0.88rem;font-weight:300;
  outline:none;transition:border-color 0.2s;-webkit-appearance:none;border-radius:0;
}
.field-group select option{background:#2C3035;color:var(--white);}
.field-group select:focus,.field-group input:focus{border-bottom-color:var(--teal-light);}
.field-group input::placeholder{color:rgba(255,255,255,0.28);}
.btn-checkin{
  width:100%;background:transparent;border:1px solid var(--teal);
  color:var(--teal-light);padding:0.85rem;
  font-family:'Lato',sans-serif;font-size:0.62rem;font-weight:700;
  letter-spacing:0.28rem;text-transform:uppercase;cursor:pointer;margin-top:0.6rem;
  transition:all 0.25s;
}
.btn-checkin:hover{background:var(--teal);color:var(--white);}
.splash-footer{font-size:0.58rem;letter-spacing:0.2rem;text-transform:uppercase;color:rgba(255,255,255,0.22);}

/* ══════════════════════════
   APP SHELL
══════════════════════════ */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.visible{display:flex;}

/* Header */
.app-header{
  background:var(--charcoal);
  padding:0 1.5rem;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-brand{display:flex;align-items:center;gap:0.8rem;}
.header-ornament{width:30px;filter:brightness(0) saturate(100%) invert(60%) sepia(40%) saturate(500%) hue-rotate(130deg) brightness(110%);}
.header-text{display:flex;flex-direction:column;line-height:1.1;}
.header-wordmark{font-family:'Lato',sans-serif;font-size:0.85rem;font-weight:900;letter-spacing:0.25em;text-transform:uppercase;color:var(--white);}
.header-sub{font-size:0.5rem;letter-spacing:0.2rem;text-transform:uppercase;color:var(--teal-light);}
.header-right{display:flex;align-items:center;gap:1rem;}
.guest-pill{display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;}
.guest-pill .gname{font-size:0.78rem;font-weight:700;color:var(--white);}
.guest-pill .groom{font-size:0.58rem;letter-spacing:0.12rem;text-transform:uppercase;color:var(--teal-light);}
.cart-btn{
  background:none;border:1px solid rgba(78,155,143,0.4);
  color:var(--teal-light);padding:0.38rem 0.85rem;
  font-size:0.9rem;cursor:pointer;display:flex;align-items:center;gap:0.4rem;
  transition:all 0.2s;position:relative;
}
.cart-btn:hover{border-color:var(--teal);background:rgba(78,155,143,0.12);}
.cart-count{
  background:var(--teal);color:var(--white);
  font-size:0.52rem;font-weight:700;
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  position:absolute;top:-5px;right:-5px;
}
.cart-count.hidden{display:none;}

/* Location bar */
.location-bar{
  background:var(--teal-dark);padding:0.55rem 1.5rem;
  display:flex;align-items:center;gap:0.7rem;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.loc-label{font-size:0.56rem;letter-spacing:0.18rem;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:700;}
.loc-select{background:none;border:none;color:var(--white);font-family:'Playfair Display',serif;font-size:0.88rem;font-style:italic;cursor:pointer;outline:none;-webkit-appearance:none;}
.loc-select option{background:var(--teal-dark);}

/* Category nav */
.cat-nav{
  background:var(--white);border-bottom:2px solid var(--divider);
  display:flex;overflow-x:auto;scrollbar-width:none;padding:0 1.2rem;
}
.cat-nav::-webkit-scrollbar{display:none;}
.cat-btn{
  background:none;border:none;border-bottom:2px solid transparent;
  padding:0.9rem 1.1rem;font-family:'Lato',sans-serif;
  font-size:0.58rem;font-weight:700;letter-spacing:0.18rem;text-transform:uppercase;
  color:var(--gray);cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;
  margin-bottom:-2px;
}
.cat-btn:hover{color:var(--teal-dark);}
.cat-btn.active{color:var(--teal-dark);border-bottom-color:var(--teal);}

/* ══════════════════════════
   MENU
══════════════════════════ */
.menu-wrap{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem 6rem;}
.section-head{margin-bottom:2rem;text-align:center;}
.section-eyebrow{font-size:0.58rem;letter-spacing:0.28rem;text-transform:uppercase;color:var(--teal);font-weight:700;display:block;margin-bottom:0.7rem;}
.section-title{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:400;color:var(--charcoal);}
.section-rule{width:36px;height:2px;background:var(--teal);margin:0.7rem auto 0;}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.5rem;}

.menu-item{
  background:var(--white);border:1px solid var(--divider);overflow:hidden;
  cursor:pointer;transition:box-shadow 0.25s,transform 0.25s;
}
.menu-item:hover{box-shadow:0 6px 28px var(--shadow);transform:translateY(-3px);}
.menu-item.no-price{cursor:default;}
.menu-item.no-price:hover{transform:none;box-shadow:none;}

.item-photo{height:180px;background:var(--cream);overflow:hidden;position:relative;}
.item-photo img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s ease;display:block;}
.menu-item:hover .item-photo img{transform:scale(1.05);}
.item-photo .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3rem;background:var(--cream);}
.item-tag{position:absolute;top:0.8rem;left:0.8rem;z-index:2;font-size:0.52rem;font-weight:700;letter-spacing:0.1rem;text-transform:uppercase;padding:0.22rem 0.6rem;}
.tag-chef{background:var(--charcoal);color:var(--teal-light);}
.tag-new{background:var(--teal);color:var(--white);}
.tag-veg{background:#4A7C59;color:var(--white);}

.item-body{padding:1rem 1.1rem 1.2rem;}
.item-name{font-family:'Playfair Display',serif;font-size:0.98rem;font-weight:500;color:var(--charcoal);margin-bottom:0.3rem;line-height:1.3;}
.item-desc{font-size:0.73rem;color:var(--gray);font-weight:300;line-height:1.6;margin-bottom:0.9rem;min-height:2.4em;}
.item-foot{display:flex;align-items:center;justify-content:space-between;}
.item-price{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:400;color:var(--charcoal);}
.item-price-na{font-size:0.68rem;color:var(--gray);font-style:italic;}
.add-btn{
  background:var(--teal);color:var(--white);border:none;
  width:30px;height:30px;border-radius:50%;font-size:1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;flex-shrink:0;
}
.add-btn:hover{background:var(--teal-dark);}
.add-btn.in-cart{background:var(--teal-dark);font-size:0.7rem;font-weight:700;}

/* Degustazione */
.deg-card{background:var(--white);border:1px solid var(--divider);border-top:3px solid var(--teal);padding:2rem 2.5rem;max-width:600px;}
.deg-price-row{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:1.2rem;border-bottom:1px solid var(--divider);margin-bottom:1.5rem;}
.deg-price-label{font-size:0.6rem;letter-spacing:0.18rem;text-transform:uppercase;color:var(--gray);}
.deg-price{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:400;color:var(--teal-dark);}
.deg-portate{display:flex;flex-direction:column;gap:0.8rem;margin-bottom:1.8rem;}
.deg-portata{display:flex;gap:1rem;align-items:flex-start;padding-bottom:0.8rem;border-bottom:1px solid var(--cream);}
.deg-portata:last-child{border:none;}
.deg-num{font-family:'Playfair Display',serif;font-size:0.75rem;color:var(--teal);min-width:1.4rem;margin-top:0.1rem;}
.deg-portata-name{font-size:0.85rem;color:var(--charcoal);font-weight:300;line-height:1.5;}
.btn-add-deg{width:100%;background:var(--teal);color:var(--white);border:none;padding:0.9rem;font-family:'Lato',sans-serif;font-size:0.62rem;font-weight:700;letter-spacing:0.25rem;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.btn-add-deg:hover{background:var(--teal-dark);}

/* ══════════════════════════
   ORDERS PANEL (cliente)
══════════════════════════ */
.orders-wrap{display:none;max-width:960px;margin:0 auto;padding:2.5rem 1.5rem 6rem;}
.orders-wrap.visible{display:block;}
.order-card{background:var(--white);border:1px solid var(--divider);border-left:3px solid var(--teal);margin-bottom:1rem;overflow:hidden;animation:fadeUp 0.3s ease;}
.order-card-head{background:var(--charcoal);padding:0.75rem 1.1rem;display:flex;justify-content:space-between;align-items:center;}
.order-id-text{font-family:'Playfair Display',serif;font-size:0.9rem;color:var(--white);}
.order-time-text{font-size:0.62rem;color:var(--gray);}
.order-status-badge{font-size:0.52rem;font-weight:700;letter-spacing:0.12rem;text-transform:uppercase;padding:0.2rem 0.65rem;}
.s-received{background:rgba(78,155,143,0.18);color:var(--teal-light);}
.s-preparing{background:rgba(176,104,48,0.18);color:#C07840;}
.s-delivering{background:rgba(58,106,156,0.18);color:#4A7AAC;}
.s-delivered{background:rgba(61,122,82,0.15);color:#3D7A52;}
.order-card-body{padding:1rem 1.1rem;}
.order-meta{display:flex;gap:1.2rem;margin-bottom:0.8rem;font-size:0.7rem;color:var(--gray);}
.order-meta strong{color:var(--charcoal);font-weight:700;}
.order-items-list{list-style:none;}
.order-items-list li{display:flex;justify-content:space-between;padding:0.28rem 0;border-bottom:1px solid var(--cream);font-size:0.78rem;}
.order-items-list li:last-child{border:none;}
.oi-qty{color:var(--teal);font-weight:700;margin-right:0.3rem;}
.order-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--divider);}
.otr-label{font-size:0.58rem;letter-spacing:0.15rem;text-transform:uppercase;color:var(--gray);}
.otr-amount{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--teal-dark);}
.order-note-block{margin-top:0.5rem;padding:0.45rem 0.8rem;background:var(--cream);border-left:2px solid var(--teal);font-size:0.7rem;color:var(--gray);font-style:italic;}
.no-orders{text-align:center;padding:4rem 2rem;color:var(--gray);font-weight:300;}

/* ══════════════════════════
   TAB BAR
══════════════════════════ */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--divider);display:flex;z-index:50;}
.tab-btn{flex:1;background:none;border:none;border-top:2px solid transparent;padding:0.65rem 0.5rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:0.18rem;color:var(--gray);transition:all 0.2s;}
.tab-icon{font-size:1.1rem;}
.tab-label{font-size:0.5rem;letter-spacing:0.14rem;text-transform:uppercase;font-weight:700;}
.tab-btn.active{color:var(--teal-dark);border-top-color:var(--teal);}

/* ══════════════════════════
   CART SIDEBAR
══════════════════════════ */
.cart-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(28,34,38,0.45);}
.cart-overlay.open{display:block;}
.cart-sidebar{position:fixed;top:0;right:-440px;bottom:0;width:min(440px,100vw);background:var(--off-white);z-index:201;display:flex;flex-direction:column;transition:right 0.35s cubic-bezier(0.4,0,0.2,1);box-shadow:-4px 0 40px rgba(0,0,0,0.12);}
.cart-sidebar.open{right:0;}
.cart-head{background:var(--charcoal);padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
.cart-head-brand{display:flex;align-items:center;gap:0.6rem;}
.cart-head-orn{width:22px;filter:brightness(0) saturate(100%) invert(60%) sepia(40%) saturate(500%) hue-rotate(130deg) brightness(110%);}
.cart-head h2{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;color:var(--white);}
.cart-close{background:none;border:none;color:var(--gray);font-size:1.2rem;cursor:pointer;line-height:1;}
.cart-close:hover{color:var(--white);}
.cart-loc-info{padding:0.65rem 1.5rem;background:var(--teal-pale);border-bottom:1px solid var(--teal-border);font-size:0.7rem;color:var(--mid);display:flex;gap:0.4rem;}
.cart-loc-info strong{color:var(--teal-dark);}
.cart-items-list{flex:1;overflow-y:auto;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:0.9rem;}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.8rem;height:100%;color:var(--gray);font-weight:300;text-align:center;}
.cart-empty-icon{font-size:2.5rem;opacity:0.25;}
.cart-item{background:var(--white);border:1px solid var(--divider);padding:0.85rem 1rem;display:flex;gap:0.8rem;align-items:center;}
.ci-emoji{font-size:1.5rem;flex-shrink:0;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-family:'Playfair Display',serif;font-size:0.88rem;color:var(--charcoal);}
.ci-price{font-size:0.72rem;color:var(--teal-dark);font-weight:700;}
.ci-note{width:100%;background:var(--cream);border:1px solid var(--divider);padding:0.32rem 0.5rem;font-family:'Lato',sans-serif;font-size:0.7rem;color:var(--charcoal);resize:none;outline:none;margin-top:0.35rem;transition:border-color 0.2s;}
.ci-note:focus{border-color:var(--teal);}
.qty-ctrl{display:flex;align-items:center;gap:0.4rem;flex-shrink:0;}
.qty-btn{background:var(--cream);border:1px solid var(--divider);color:var(--charcoal);width:24px;height:24px;border-radius:50%;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.qty-btn:hover{background:var(--teal-pale);border-color:var(--teal);}
.qty-val{font-size:0.85rem;font-weight:700;min-width:1.2ch;text-align:center;}
.cart-foot{padding:1.1rem 1.5rem;border-top:1px solid var(--divider);background:var(--white);}
.cart-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem;}
.ct-label{font-size:0.58rem;letter-spacing:0.18rem;text-transform:uppercase;color:var(--gray);}
.ct-amount{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--teal-dark);}
.special-req-group{margin-bottom:1rem;}
.special-req-group label{display:block;font-size:0.58rem;letter-spacing:0.16rem;text-transform:uppercase;color:var(--gray);margin-bottom:0.4rem;font-weight:700;}
.special-req-group textarea{width:100%;background:var(--cream);border:1px solid var(--divider);padding:0.55rem 0.75rem;font-family:'Lato',sans-serif;font-size:0.78rem;color:var(--charcoal);resize:none;height:50px;outline:none;transition:border-color 0.2s;}
.special-req-group textarea:focus{border-color:var(--teal);}
.btn-order{width:100%;background:var(--teal);color:var(--white);border:none;padding:0.92rem;font-family:'Lato',sans-serif;font-size:0.62rem;font-weight:700;letter-spacing:0.28rem;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.btn-order:hover{background:var(--teal-dark);}
.btn-order:disabled{background:var(--divider);color:var(--gray);cursor:not-allowed;}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--charcoal);color:var(--white);padding:0.75rem 1.8rem;font-size:0.76rem;letter-spacing:0.04em;border-left:3px solid var(--teal);z-index:300;opacity:0;transition:opacity 0.3s,transform 0.3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@media(max-width:480px){.checkin-card{padding:1.8rem 1.4rem;}.menu-grid{grid-template-columns:1fr;}.app-header{padding:0 1rem;}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-brand">
    <img class="splash-ornament"
         src="https://www.villafontanaaglianoterme.it/wp-content/themes/villafontana2020/dist/images/logo-bianco.svg"
         onerror="this.style.display='none'" alt="">
    <div class="splash-logo-rule">
      <span class="splash-wordmark">Villafontana</span>
    </div>
    <div class="splash-tagline">Relais · Suites · Restaurant &amp; Spa · Agliano Terme</div>
    <div class="splash-stars">★ ★ ★ ★</div>
    <div class="splash-service-badge">Extra Service</div>
  </div>

const CATEGORIES=[...new Set(MENU.map(i=>i.cat)),'Degustazione'];
let guest={name:'',room:'',location:''};
let cart=[];let orders=[];let activeCategory='Antipasti';

function fbPushOrder(o){if(!window._fbReady)return;try{window._fbPush(window._fbRef(window._fbDB,'orders'),o);}catch(e){}}
function fbListenOrders(){if(!window._fbReady)return;try{window._fbOnValue(window._fbRef(window._fbDB,'orders'),snap=>{const d=snap.val();if(!d)return;Object.entries(d).forEach(([k,o])=>{const l=orders.find(x=>x.id===o.id);if(l&&l.status!==o.status){l.status=o.status;l._fbKey=k;renderOrdersList();if(o.status==='preparing')showToast('👨\u200d🍳 Il tuo ordine è in preparazione!');if(o.status==='delivering')showToast('🛎 Il tuo ordine è in arrivo!');if(o.status==='delivered')showToast('\u2705 Ordine consegnato. Buon appetito!');}if(l&&!l._fbKey)l._fbKey=k;});});}catch(e){}}
window.addEventListener('firebase-ready',fbListenOrders);

function doCheckIn(){
  const name=document.getElementById('input-name').value.trim();
  const room=document.getElementById('input-room').value;
  const loc=document.getElementById('input-location').value;
  if(!name||!room||!loc){shakeMissing([!name&&'input-name',!room&&'input-room',!loc&&'input-location'].filter(Boolean));return;}
  guest={name,room,location:loc};
  document.getElementById('disp-name').textContent=name;
  document.getElementById('disp-room').textContent=room;
  const ls=document.getElementById('disp-location');[...ls.options].forEach(o=>{if(o.text===loc)o.selected=true;});
  document.getElementById('cart-loc-disp').textContent=loc;
  document.getElementById('cart-room-disp').textContent=room;
  const sp=document.getElementById('splash');sp.classList.add('fade-out');
  setTimeout(()=>{sp.style.display='none';document.getElementById('app').classList.add('visible');buildCatNav();renderMenu();},900);
}
function shakeMissing(ids){ids.forEach(id=>{const el=document.getElementById(id);el.style.borderBottomColor='#AC4A4A';el.style.animation='shake 0.4s ease';setTimeout(()=>{el.style.animation='';el.style.borderBottomColor='';},600);});}
const _s=document.createElement('style');_s.textContent='@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}';document.head.appendChild(_s);
function updateLocation(v){guest.location=v;document.getElementById('cart-loc-disp').textContent=v;}

function buildCatNav(){
  document.getElementById('cat-nav').innerHTML=CATEGORIES.map(c=>`<button class="cat-btn ${c===activeCategory?'active':''}" onclick="setCategory('${c}')">${c}</button>`).join('');
}
function setCategory(c){activeCategory=c;buildCatNav();renderMenu();document.getElementById('menu-wrap').scrollIntoView({behavior:'smooth',block:'start'});}

function renderMenu(){
  const w=document.getElementById('menu-wrap');
  if(activeCategory==='Degustazione'){
    w.innerHTML=`<div class="section-head"><span class="section-eyebrow">Esperienza completa</span><h2 class="section-title">${DEGUSTAZIONE.nome}</h2><div class="section-rule"></div></div>
    <div class="deg-card"><div class="deg-price-row"><span class="deg-price-label">${DEGUSTAZIONE.note}</span><span class="deg-price">€ ${DEGUSTAZIONE.prezzo.toFixed(2).replace('.',',')}</span></div>
    <div class="deg-portate">${DEGUSTAZIONE.portate.map((p,i)=>`<div class="deg-portata"><span class="deg-num">${i+1}.</span><span class="deg-portata-name">${p}</span></div>`).join('')}</div>
    <button class="btn-add-deg" onclick="addDegustazione()">Aggiungi al tuo ordine</button></div>`;return;
  }
  const items=MENU.filter(i=>i.cat===activeCategory);
  const inC=new Set(cart.map(c=>c.item.id));
  w.innerHTML=`<div class="section-head"><span class="section-eyebrow">La Fontana del Re · Primavera 2026</span><h2 class="section-title">${activeCategory}</h2><div class="section-rule"></div></div>
  <div class="menu-grid">${items.map(item=>itemCard(item,inC.has(item.id))).join('')}</div>`;
}
function itemCard(item,inC){
  const tM={chef:'⭐ Chef',veg:'Veg',new:'Novità'};const tC={chef:'tag-chef',veg:'tag-veg',new:'tag-new'};
  const pH=item.price!==null?`<span class="item-price">€ ${item.price.toFixed(2).replace('.',',')}</span>`:`<span class="item-price-na">Chiedere al sommelier</span>`;
  const can=item.price!==null;
  const ih=item.img?`<img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'';
  const fs=item.img?'display:none':'display:flex';
  return `<div class="menu-item${can?'':' no-price'}" ${can?`onclick="addToCart(${item.id})"`:''}><div class="item-photo">${ih}<div class="fallback" style="${fs}">${item.emoji}</div>${item.tag?`<span class="item-tag ${tC[item.tag]||''}">${tM[item.tag]||item.tag}</span>`:''}</div><div class="item-body"><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}</div><div class="item-foot">${pH}${can?`<button class="add-btn ${inC?'in-cart':''}" onclick="event.stopPropagation();addToCart(${item.id})">${inC?'✓':'+'}</button>`:''}</div></div></div>`;
}
function addToCart(id){const item=MENU.find(i=>i.id===id);const ex=cart.find(c=>c.item.id===id);if(ex)ex.qty++;else cart.push({item,qty:1,note:''});updateCartBadge();renderMenu();renderCartItems();showToast(item.emoji+' '+item.name+' aggiunto');}
function addDegustazione(){const ex=cart.find(c=>c.item.id==='deg');if(ex)ex.qty++;else cart.push({item:{id:'deg',name:'Menù Degustazione Contemporaneo',price:DEGUSTAZIONE.prezzo,emoji:'⭐',cat:'Degustazione'},qty:1,note:''});updateCartBadge();showToast('⭐ Menù Degustazione aggiunto');}
function removeFromCart(id){cart=cart.filter(c=>c.item.id!==id);updateCartBadge();renderMenu();renderCartItems();}
function changeQty(id,d){const e=cart.find(c=>c.item.id===id);if(!e)return;e.qty+=d;if(e.qty<=0){removeFromCart(id);return;}updateCartBadge();renderCartItems();}
function updateNote(id,v){const e=cart.find(c=>c.item.id===id);if(e)e.note=v;}
function updateCartBadge(){const t=cart.reduce((s,c)=>s+c.qty,0);const b=document.getElementById('cart-count');b.textContent=t;b.classList.toggle('hidden',t===0);document.getElementById('btn-order').disabled=cart.length===0;updateCartTotal();}
function updateCartTotal(){const t=cart.reduce((s,c)=>s+((c.item.price||0)*c.qty),0);document.getElementById('cart-total').textContent='€ '+t.toFixed(2).replace('.',',');}
function renderCartItems(){
  const el=document.getElementById('cart-items-list');
  if(!cart.length){el.innerHTML='<div class="cart-empty"><span class="cart-empty-icon">🍽</span><p>Nessun articolo nel carrello.</p></div>';return;}
  el.innerHTML=cart.map(e=>`<div class="cart-item"><span class="ci-emoji">${e.item.emoji}</span><div class="ci-info"><div class="ci-name">${e.item.name}</div><div class="ci-price">€ ${((e.item.price||0)*e.qty).toFixed(2).replace('.',',')}${e.qty>1?` (${e.qty}×€${(e.item.price||0).toFixed(2).replace('.',',')})`:''}
  </div><textarea class="ci-note" rows="1" placeholder="Note…" onchange="updateNote('${e.item.id}',this.value)" onfocus="this.rows=2" onblur="this.rows=1">${e.note}</textarea></div><div class="qty-ctrl"><button class="qty-btn" onclick="changeQty('${e.item.id}',-1)">−</button><span class="qty-val">${e.qty}</span><button class="qty-btn" onclick="changeQty('${e.item.id}',+1)">+</button></div></div>`).join('');
}
function toggleCart(){const o=document.getElementById('cart-overlay'),s=document.getElementById('cart-sidebar');const op=s.classList.contains('open');o.classList.toggle('open',!op);s.classList.toggle('open',!op);if(!op)renderCartItems();}

function placeOrder(){
  if(!cart.length)return;
  const now=new Date();
  const order={id:'ORD-'+Date.now().toString(36).toUpperCase(),timestamp:Date.now(),
    date:now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}),
    time:now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}),
    location:guest.location,room:guest.room,guest:guest.name,
    items:cart.map(c=>({name:c.item.name,qty:c.qty,price:c.item.price||0,note:c.note||'',emoji:c.item.emoji})),
    total:cart.reduce((s,c)=>s+((c.item.price||0)*c.qty),0),
    specialReq:document.getElementById('special-req').value.trim()||'',status:'received'};
  orders.unshift(order);cart=[];document.getElementById('special-req').value='';
  updateCartBadge();renderCartItems();renderMenu();toggleCart();
  fbPushOrder(order);showToast('✦ Ordine inviato con successo!');
}

const SL={received:'Ricevuto',preparing:'In preparazione',delivering:'In consegna',delivered:'Consegnato'};
const SC={received:'s-received',preparing:'s-preparing',delivering:'s-delivering',delivered:'s-delivered'};
function renderOrdersList(){
  const el=document.getElementById('orders-list');
  if(!orders.length){el.innerHTML='<div class="no-orders"><p>Nessun ordine ancora.<br>Sfoglia il menu e ordina!</p></div>';return;}
  el.innerHTML=orders.map(o=>`<div class="order-card"><div class="order-card-head"><div><div class="order-id-text">${o.id}</div><div class="order-time-text">📅 ${o.date} · ⏱ ${o.time}</div></div><span class="order-status-badge ${SC[o.status]||'s-received'}">${SL[o.status]||o.status}</span></div><div class="order-card-body"><div class="order-meta"><span>📍 <strong>${o.location}</strong></span><span>🛏 <strong>${o.room}</strong></span></div><ul class="order-items-list">${o.items.map(i=>`<li><span><span class="oi-qty">${i.qty}×</span>${i.emoji} ${i.name}${i.note?` <em style="color:var(--gray);font-size:0.65rem">(${i.note})</em>`:''}</span><span>€ ${(i.price*i.qty).toFixed(2).replace('.',',')}</span></li>`).join('')}</ul>${o.specialReq?`<div class="order-note-block">📝 ${o.specialReq}</div>`:''}<div class="order-total-row"><span class="otr-label">Totale ordine</span><span class="otr-amount">€ ${o.total.toFixed(2).replace('.',',')}</span></div></div></div>`).join('');
}

function switchTab(tab){
  const mw=document.getElementById('menu-wrap'),ow=document.getElementById('orders-wrap');
  const cn=document.getElementById('cat-nav'),lb=document.querySelector('.location-bar');
  const tm=document.getElementById('tab-menu'),to=document.getElementById('tab-orders');
  if(tab==='menu'){mw.style.display='';cn.style.display='';lb.style.display='';ow.classList.remove('visible');tm.classList.add('active');to.classList.remove('active');}
  else{mw.style.display='none';cn.style.display='none';lb.style.display='none';ow.classList.add('visible');tm.classList.remove('active');to.classList.add('active');renderOrdersList();}
}
let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2800);}
</script>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{

  --teal-pale:rgba(78,155,143,0.09);--teal-border:rgba(78,155,143,0.25);

/* ══ SCHERMATA LINGUA ══ */
#lang-screen{
  position:fixed;inset:0;z-index:2000;
  background:var(--charcoal);
  background-image:url('http://www.villafontanaaglianoterme.it/wp-content/uploads/2021/06/img-1200x630-1.jpg');
  background-size:cover;background-position:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2rem;padding:2rem;
  transition:opacity 0.5s;
}
#lang-screen::before{content:'';position:absolute;inset:0;background:rgba(20,26,30,0.82);z-index:0;pointer-events:none;}
#lang-screen>*{position:relative;z-index:1;}
#lang-screen.hide{opacity:0;pointer-events:none;}

.lang-logo{text-align:center;}
.lang-ornament{width:55px;margin-bottom:0.5rem;filter:brightness(0) saturate(100%) invert(60%) sepia(40%) saturate(500%) hue-rotate(130deg) brightness(110%);}
.lang-name{font-family:'Lato',sans-serif;font-size:1.5rem;font-weight:900;letter-spacing:0.3em;text-transform:uppercase;color:#fff;}
.lang-sub{font-size:0.55rem;letter-spacing:0.22rem;text-transform:uppercase;color:var(--teal-light);margin-top:0.2rem;}
.lang-prompt{font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic;color:rgba(255,255,255,0.75);text-align:center;}

.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.7rem;width:min(320px,90vw);}
.lang-btn{
  background:rgba(255,255,255,0.08);border:1px solid rgba(78,155,143,0.25);
  color:#fff;padding:1.1rem 0.5rem;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:0.45rem;
  transition:background 0.15s;font-family:'Lato',sans-serif;
  min-height:88px;
}
.lang-btn:active{background:rgba(78,155,143,0.3);}
.lang-flag{font-size:2.4rem;line-height:1;}
.lang-label{font-size:0.72rem;letter-spacing:0.06rem;text-transform:uppercase;font-weight:700;color:rgba(255,255,255,0.8);}

/* ══ CHECKIN ══ */
#checkin-screen{
  position:fixed;inset:0;z-index:1000;
  background:var(--charcoal);
  background-image:url('http://www.villafontanaaglianoterme.it/wp-content/uploads/2021/06/img-1200x630-1.jpg');
  background-size:cover;background-position:center;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:1.5rem;padding:1.5rem;
  transition:opacity 0.6s;
}
#checkin-screen::before{content:'';position:absolute;inset:0;background:rgba(20,26,30,0.8);z-index:0;pointer-events:none;}
#checkin-screen>*{position:relative;z-index:1;}
#checkin-screen.visible{display:flex;}
#checkin-screen.fade-out{opacity:0;pointer-events:none;}

.ci-logo{text-align:center;display:flex;flex-direction:column;align-items:center;}
.ci-orn{width:55px;margin-bottom:0.5rem;filter:brightness(0) saturate(100%) invert(60%) sepia(40%) saturate(500%) hue-rotate(130deg) brightness(110%);}
.ci-name{font-family:'Lato',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;color:#fff;}
.ci-tag{font-size:0.52rem;letter-spacing:0.2rem;text-transform:uppercase;color:var(--teal-light);margin-top:0.2rem;}
.ci-badge{margin-top:0.6rem;background:var(--teal);color:#fff;font-size:0.52rem;letter-spacing:0.2rem;text-transform:uppercase;font-weight:700;padding:0.25rem 0.9rem;}

.ci-card{background:rgba(255,255,255,0.09);border:1px solid rgba(78,155,143,0.3);padding:2rem 1.6rem;width:min(380px,94vw);}
.ci-card h2{font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;color:var(--teal-light);text-align:center;margin-bottom:1.4rem;font-weight:400;}
.ci-field{margin-bottom:1.1rem;}
.ci-field label{display:block;font-size:0.7rem;letter-spacing:0.18rem;text-transform:uppercase;color:var(--teal-light);margin-bottom:0.5rem;font-weight:700;}
.ci-field input,.ci-field select{
  width:100%;background:rgba(255,255,255,0.12);border:none;
  border-bottom:2px solid rgba(122,189,181,0.45);
  padding:0.85rem 0.2rem;color:#fff;
  font-family:'Lato',sans-serif;font-size:16px;font-weight:400;
  outline:none;-webkit-appearance:none;border-radius:0;
}
.ci-field select option{background:#2C3035;}
.ci-field input::placeholder{color:rgba(255,255,255,0.3);}
.ci-btn{
  width:100%;background:var(--teal);border:none;
  color:#fff;height:54px;margin-top:0.8rem;
  font-family:'Lato',sans-serif;font-size:0.78rem;font-weight:700;
  letter-spacing:0.22rem;text-transform:uppercase;cursor:pointer;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(78,155,143,0.35);
}
.ci-btn:active{background:var(--teal);color:#fff;}

/* ══ RETURNING ══ */
#returning-screen{
  position:fixed;inset:0;z-index:1000;
  background:var(--charcoal);
  background-image:url('http://www.villafontanaaglianoterme.it/wp-content/uploads/2021/06/img-1200x630-1.jpg');
  background-size:cover;background-position:center;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:1.5rem;padding:1.5rem;
}
#returning-screen::before{content:'';position:absolute;inset:0;background:rgba(20,26,30,0.82);z-index:0;pointer-events:none;}
#returning-screen>*{position:relative;z-index:1;}
#returning-screen.visible{display:flex;}
.ret-card{background:rgba(255,255,255,0.07);border:1px solid rgba(78,155,143,0.25);padding:2rem 1.5rem;width:min(340px,94vw);text-align:center;}
.ret-welcome{font-family:'Playfair Display',serif;font-size:0.95rem;font-style:italic;color:var(--teal-light);margin-bottom:0.4rem;}
.ret-gname{font-size:1.6rem;font-weight:900;color:#fff;margin-bottom:0.2rem;}
.ret-room{font-size:0.6rem;letter-spacing:0.18rem;text-transform:uppercase;color:var(--teal-light);margin-bottom:1.5rem;}
.ret-btn{width:100%;background:var(--teal);color:#fff;border:none;height:48px;font-family:'Lato',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:0.22rem;text-transform:uppercase;cursor:pointer;margin-bottom:0.8rem;}
.ret-change{background:none;border:none;color:rgba(255,255,255,0.35);font-size:0.78rem;cursor:pointer;font-family:'Lato',sans-serif;text-decoration:underline;}

/* ══ APP ══ */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.visible{display:flex;}

/* Header */
.app-header{
  background:var(--charcoal);height:58px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem;position:sticky;top:0;z-index:100;
  box-shadow:0 1px 8px rgba(0,0,0,0.18);
}
.hdr-brand{display:flex;align-items:center;gap:0.55rem;}
.hdr-orn{width:22px;filter:brightness(0) saturate(100%) invert(60%) sepia(40%) saturate(500%) hue-rotate(130deg) brightness(110%);}
.hdr-txt{font-family:'Lato',sans-serif;font-size:0.78rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:#fff;}
.hdr-right{display:flex;align-items:center;gap:0.5rem;}
.hdr-guest{display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;}
.hdr-gname{font-size:0.82rem;font-weight:700;color:#fff;}
.hdr-groom{font-size:0.6rem;letter-spacing:0.1rem;text-transform:uppercase;color:var(--teal-light);}
.cart-btn{
  background:rgba(78,155,143,0.15);border:2px solid rgba(78,155,143,0.5);
  color:var(--teal-light);width:54px;height:54px;border-radius:50%;
  font-size:1.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  position:relative;transition:background 0.15s;
}
.cart-btn:active{background:rgba(78,155,143,0.3);}
.cart-badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--teal);color:#fff;
  font-size:0.52rem;font-weight:700;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.cart-badge.hidden{display:none;}

/* Categoria tab */
.cat-bar{
  background:var(--white);border-bottom:2px solid var(--divider);
  display:flex;overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-tab{
  background:none;border:none;border-bottom:3px solid transparent;
  padding:0 1.1rem;height:48px;
  font-family:'Lato',sans-serif;font-size:0.72rem;font-weight:700;
  letter-spacing:0.12rem;text-transform:uppercase;
  color:var(--gray);cursor:pointer;white-space:nowrap;
  flex-shrink:0;margin-bottom:-3px;
  display:flex;align-items:center;
}
.cat-tab.active{color:var(--teal-dark);border-bottom-color:var(--teal);}

/* Menu items */
.menu-list{padding:0 0 80px;background:var(--off-white);}
.menu-item{
  background:var(--white);border-bottom:1px solid var(--divider);
  display:flex;align-items:stretch;min-height:110px;
  cursor:pointer;transition:background 0.1s;
}
.menu-item:active{background:rgba(78,155,143,0.04);}
.item-img{width:110px;min-width:110px;height:110px;overflow:hidden;position:relative;background:var(--cream);flex-shrink:0;}
.item-img img{width:100%;height:100%;object-fit:cover;display:block;}
.item-img .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2rem;}
.item-tag{position:absolute;top:0.3rem;left:0.3rem;z-index:2;font-size:0.45rem;font-weight:700;letter-spacing:0.08rem;text-transform:uppercase;padding:0.15rem 0.4rem;}
.tag-chef{background:var(--charcoal);color:var(--teal-light);}
.tag-new{background:var(--teal);color:#fff;}
.item-body{flex:1;padding:0.8rem 0.95rem;display:flex;flex-direction:column;justify-content:center;min-width:0;}
.item-name{font-family:'Playfair Display',serif;font-size:1.12rem;font-weight:600;color:var(--charcoal);line-height:1.25;margin-bottom:0.25rem;}
.item-desc{font-size:0.76rem;color:var(--mid);font-weight:300;line-height:1.5;margin-bottom:0.55rem;}
.item-foot{display:flex;align-items:center;justify-content:space-between;}
.item-price{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;color:var(--charcoal);}
.item-price-na{font-size:0.65rem;color:var(--gray);font-style:italic;}
.add-btn{
  background:var(--teal);color:#fff;border:none;
  width:42px;height:42px;border-radius:50%;
  font-size:1.3rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background 0.15s;
  box-shadow:0 2px 8px rgba(78,155,143,0.35);
}
.add-btn:active{background:var(--teal-dark);}
.add-btn.in-cart{background:var(--teal-dark);font-size:0.72rem;font-weight:700;}

/* Tab bar */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--divider);
  display:flex;z-index:50;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-btn{
  flex:1;background:none;border:none;border-top:3px solid transparent;
  padding:0.65rem;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:0.2rem;
  color:var(--gray);
}
.tab-icon{font-size:1.3rem;}
.tab-lbl{font-size:0.6rem;letter-spacing:0.1rem;text-transform:uppercase;font-weight:700;}
.tab-btn.active{color:var(--teal-dark);border-top-color:var(--teal);}

/* Ordini cliente */
.orders-view{display:none;padding:0 0 80px;}
.orders-view.visible{display:block;}
.orders-hdr{padding:1.2rem 1rem 0.6rem;text-align:center;}
.orders-hdr h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:400;color:var(--charcoal);}
.orders-hdr .rule{width:28px;height:2px;background:var(--teal);margin:0.5rem auto 0;}
.order-card{background:var(--white);border-bottom:1px solid var(--divider);border-left:3px solid var(--teal);padding:1rem;margin-bottom:0;}
.oc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;}
.oc-id{font-size:0.82rem;font-weight:700;color:var(--charcoal);}
.oc-time{font-size:0.7rem;color:var(--gray);}
.oc-status{font-size:0.52rem;font-weight:700;letter-spacing:0.1rem;text-transform:uppercase;padding:0.18rem 0.55rem;}
.s-received{background:rgba(78,155,143,0.15);color:var(--teal-dark);}
.s-delivered{background:rgba(61,122,82,0.12);color:#3D7A52;}
.oc-items{font-size:0.85rem;color:#555;line-height:1.65;margin-bottom:0.55rem;}
.oc-total{display:flex;justify-content:space-between;border-top:1px solid var(--divider);padding-top:0.5rem;}
.oc-total-lbl{font-size:0.56rem;letter-spacing:0.12rem;text-transform:uppercase;color:var(--gray);}
.oc-total-amt{font-family:'Playfair Display',serif;font-size:1rem;color:var(--teal-dark);}
.orders-grand{background:var(--charcoal);padding:1rem;display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem;}
.og-lbl{font-size:0.58rem;letter-spacing:0.14rem;text-transform:uppercase;color:rgba(255,255,255,0.6);}
.og-amt{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;}

/* Cart sidebar */
.cart-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(20,26,30,0.45);}
.cart-overlay.open{display:block;}
.cart-panel{
  position:fixed;top:0;right:-100vw;bottom:0;width:100vw;
  background:var(--off-white);z-index:201;
  display:flex;flex-direction:column;
  transition:right 0.3s cubic-bezier(0.4,0,0.2,1);
}
.cart-panel.open{right:0;}
.cart-hdr{background:var(--charcoal);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;flex-shrink:0;}
.cart-hdr h2{font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;color:#fff;}
.cart-close{background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.3rem;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
.cart-loc-row{padding:0.6rem 1rem;background:rgba(78,155,143,0.08);border-bottom:1px solid rgba(78,155,143,0.2);font-size:0.68rem;color:var(--gray);}
.cart-loc-row strong{color:var(--teal-dark);}
.cart-items{flex:1;overflow-y:auto;padding:0.8rem 1rem;display:flex;flex-direction:column;gap:0.7rem;}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.7rem;height:100%;color:var(--gray);text-align:center;font-size:0.85rem;font-weight:300;}
.c-item{background:var(--white);border:1px solid var(--divider);padding:0.8rem;display:flex;gap:0.7rem;align-items:center;}
.c-emoji{font-size:1.4rem;flex-shrink:0;}
.c-info{flex:1;min-width:0;}
.c-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--charcoal);}
.c-price{font-size:0.82rem;color:var(--teal-dark);font-weight:700;margin-top:0.12rem;}
.qty-row{display:flex;align-items:center;gap:0.4rem;flex-shrink:0;}
.qty-btn{background:var(--cream);border:1px solid var(--divider);width:40px;height:40px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-btn:active{background:rgba(78,155,143,0.15);}
.qty-val{font-size:1rem;font-weight:700;min-width:1.4ch;text-align:center;}
.cart-foot{padding:1rem;border-top:1px solid var(--divider);background:var(--white);flex-shrink:0;padding-bottom:calc(1rem + env(safe-area-inset-bottom));}
.cart-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.9rem;}
.ct-lbl{font-size:0.58rem;letter-spacing:0.16rem;text-transform:uppercase;color:var(--gray);}
.ct-amt{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--teal-dark);}
/* Location in cart */
.cart-loc-sel-group{margin-bottom:0.8rem;}
.cart-loc-sel-group label{display:block;font-size:0.56rem;letter-spacing:0.14rem;text-transform:uppercase;color:var(--gray);margin-bottom:0.35rem;font-weight:700;}
.cart-loc-sel-group select{width:100%;background:var(--off-white);border:1px solid var(--divider);padding:0.65rem 0.8rem;font-family:'Lato',sans-serif;font-size:16px;color:var(--charcoal);outline:none;-webkit-appearance:none;}
.cart-note-group{margin-bottom:0.9rem;}
.cart-note-group label{display:block;font-size:0.56rem;letter-spacing:0.14rem;text-transform:uppercase;color:var(--gray);margin-bottom:0.35rem;font-weight:700;}
.cart-note-group textarea{width:100%;background:var(--off-white);border:1px solid var(--divider);padding:0.6rem 0.8rem;font-family:'Lato',sans-serif;font-size:16px;color:var(--charcoal);resize:none;height:52px;outline:none;}
.btn-order{width:100%;background:var(--teal);color:#fff;border:none;height:56px;font-family:'Lato',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:0.22rem;text-transform:uppercase;cursor:pointer;transition:background 0.2s;box-shadow:0 4px 16px rgba(78,155,143,0.3);}
.btn-order:disabled{background:var(--divider);color:var(--gray);cursor:not-allowed;}
.btn-order:active{background:var(--teal-dark);}

/* Toast */
.toast{
  position:fixed;bottom:calc(78px + env(safe-area-inset-bottom));
  left:1rem;right:1rem;
  background:var(--charcoal);color:#fff;
  padding:1rem 1.2rem;font-size:0.85rem;font-weight:500;
  border-left:4px solid var(--teal);
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
  z-index:300;opacity:0;transition:opacity 0.3s,transform 0.3s;
  transform:translateY(12px);text-align:center;line-height:1.5;
}
.toast.show{opacity:1;transform:translateY(0);}
.toast.delivered{background:var(--teal-dark);border-left-color:#fff;}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
</style>
</head>

    <button class="ret-change" id="ret-change" onclick="resetAndRegister()">Non sei tu?</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div class="hdr-brand">
      <img class="hdr-orn" src="https://www.villafontanaaglianoterme.it/wp-content/themes/villafontana2020/dist/images/logo-bianco.svg" onerror="this.style.display='none'" alt="">
      <span class="hdr-txt">Villafontana</span>
    </div>

      <div class="hdr-guest">
        <span class="hdr-gname" id="disp-name">—</span>
        <span class="hdr-groom" id="disp-room">—</span>
      </div>
      <button class="cart-btn" onclick="toggleCart()">🛒
        <span class="cart-badge hidden" id="cart-badge">0</span>
      </button>
    </div>
  </header>

  <div class="cat-bar" id="cat-bar"></div>

  <main>
    <div class="menu-list" id="menu-list"></div>
    <div class="orders-view" id="orders-view">
      <div class="orders-hdr">
        <h2 id="orders-title">I miei ordini</h2>
        <div class="rule"></div>
      </div>
      <div id="orders-list"></div>
    </div>
  </main>

  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('menu')" id="t-menu">
      <span class="tab-icon">🍽</span><span class="tab-lbl" id="tl-menu">Menu</span>
    </button>
    <button class="tab-btn" onclick="switchTab('orders')" id="t-orders">
      <span class="tab-icon">📋</span><span class="tab-lbl" id="tl-orders">Ordini</span>
    </button>
  </nav>
</div>

<!-- CART -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-hdr">
    <h2 id="cart-title">Il tuo ordine</h2>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-loc-row">📍 <strong id="cart-loc-txt">—</strong> · <span id="cart-room-txt">—</span></div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-foot">
    <div class="cart-total-row">
      <span class="ct-lbl" id="cart-total-lbl">Totale</span>
      <span class="ct-amt" id="cart-total">€ 0,00</span>
    </div>
    <div class="cart-loc-sel-group">
      <label id="cart-loc-lbl">📍 Dove sei adesso</label>
      <select id="cart-loc-sel" onchange="setLocation(this.value)">
        <option value="" id="cart-loc-ph">— Seleziona posizione —</option>
        <option value="In camera">In camera</option>
        <option value="Piscina">Piscina</option>
        <option value="Terrazza">Terrazza panoramica</option>
        <option value="Spa">Spa & Wellness</option>
        <option value="Giardino">Giardino</option>
        <option value="Lounge">Lounge bar</option>
      </select>
    </div>
    <div class="cart-note-group">
      <label id="cart-note-lbl">Note</label>
      <textarea id="cart-note" placeholder="Allergie, preferenze…"></textarea>
    </div>
    <button class="btn-order" id="btn-order" onclick="placeOrder()" disabled>Invia ordine</button>
  </div>
</div>

const CATS = [...new Set(MENU.map(i=>i.cat))];
const CAT_LABELS = {
  it:{Analcolici:'Analcolici','Hot Drinks':'Hot Drinks',Cocktail:'Cocktail',Vini:'Vini',Snack:'Snack'},
  en:{Analcolici:'Soft Drinks','Hot Drinks':'Hot Drinks',Cocktail:'Cocktails',Vini:'Wines',Snack:'Snacks'},
  fr:{Analcolici:'Sans alcool','Hot Drinks':'Boissons chaudes',Cocktail:'Cocktails',Vini:'Vins',Snack:'Snacks'},
  de:{Analcolici:'Alkoholfrei','Hot Drinks':'Heißgetränke',Cocktail:'Cocktails',Vini:'Weine',Snack:'Snacks'},
  es:{Analcolici:'Sin alcohol','Hot Drinks':'Bebidas calientes',Cocktail:'Cócteles',Vini:'Vinos',Snack:'Aperitivos'},
  nl:{Analcolici:'Frisdranken','Hot Drinks':'Warme dranken',Cocktail:'Cocktails',Vini:'Wijnen',Snack:'Snacks'},
};

/* ══ STATE ══ */
let lang='it', t=T.it;
let guest={name:'',room:'',location:''};
let cart=[], orders=[], activeCat=CATS[0];
let _roomKey='';

/* ══ FIREBASE ══ */
function fbReady(){return window._fbReady;}
function fbSet(path,val){if(!fbReady())return;window._fbSet(window._fbRef(window._fbDB,path),val).catch(e=>console.warn(e));}
function fbUpdate(path,val){if(!fbReady())return;window._fbUpdate(window._fbRef(window._fbDB,path),val).catch(e=>console.warn(e));}
function fbPush(path,val){if(!fbReady())return;window._fbPush(window._fbRef(window._fbDB,path),val).catch(e=>console.warn(e));}
function fbGet(path){return fbReady()?window._fbGet(window._fbRef(window._fbDB,path)):Promise.reject('not ready');}
function fbListen(path,cb){if(!fbReady())return;window._fbOnValue(window._fbRef(window._fbDB,path),snap=>cb(snap.val()));}
function roomKey(room){const n=(room||'').replace(/\D/g,'');return n?'Room_'+n:'';}

window.addEventListener('firebase-ready',()=>{
  // Listen for order status updates
  fbListen('orders',data=>{
    if(!data)return;
    Object.entries(data).forEach(([k,o])=>{
      const loc=orders.find(x=>x.id===o.id);
      if(loc&&loc.status!==o.status){
        loc.status=o.status;
        renderOrders();
        if(o.status==='preparing'){showToast(t.preparing_msg);}
        if(o.status==='delivering'){showToast(t.delivering_msg);}
        if(o.status==='delivered'){showToast(t.delivered_msg,true);}
      }
    });
  });
});

/* ══ LANG ══ */
function selectLang(code){
  lang=code; t=T[code];
  const scr=document.getElementById('lang-screen');
  scr.classList.add('hide');
  setTimeout(()=>{scr.style.display='none'; checkReturning();},500);
}

/* ══ CHECK RETURNING ══ */
function checkReturning(){
  try{
    const s=JSON.parse(localStorage.getItem('vf_guest')||'null');
    if(s&&s.name&&s.roomKey){
      _roomKey=s.roomKey;
      fbGet('rooms/'+_roomKey).then(snap=>{
        const d=snap.val();
        if(d&&d.guest===s.name){
          guest={name:s.name,room:s.room,location:''};
          // Restore saved lang
          if(d.lang&&T[d.lang]){lang=d.lang;t=T[lang];}
          showReturning(s.name,s.room);
        } else {
          localStorage.removeItem('vf_guest');
          showCheckIn();
        }
      }).catch(()=>showCheckIn());
    } else { showCheckIn(); }
  }catch(e){showCheckIn();}
}

function showReturning(name,room){
  const rn=(room||'').replace(/\D/g,'');
  const rw=lang==='it'?'Camera':lang==='en'?'Room':lang==='fr'?'Chambre':lang==='de'?'Zimmer':lang==='es'?'Habitación':'Kamer';
  document.getElementById('ret-welcome').textContent=t.returning;
  document.getElementById('ret-gname').textContent=name;
  document.getElementById('ret-room').textContent=rw+' '+rn;
  document.getElementById('ret-btn').textContent=t.continue;
  document.getElementById('ret-change').textContent=t.not_you;
  document.getElementById('returning-screen').classList.add('visible');
}

function continueReturning(){
  document.getElementById('returning-screen').classList.remove('visible');
  fbUpdate('rooms/'+_roomKey,{lang});
  fbUpdate('guests/'+_roomKey,{lang,lastSeen:Date.now()});
  launchApp();
}

function resetAndRegister(){
  localStorage.removeItem('vf_guest');
  if(_roomKey){fbSet('rooms/'+_roomKey,{guest:''});}
  _roomKey=''; guest={name:'',room:'',location:''};
  document.getElementById('returning-screen').classList.remove('visible');
  showCheckIn();
}

function showCheckIn(){
  applyLang();
  document.getElementById('checkin-screen').classList.add('visible');
}

/* ══ APPLY LANG ══ */
function applyLang(){
  document.getElementById('ci-title').textContent=t.welcome;
  document.getElementById('lbl-name').textContent=t.name;
  document.getElementById('lbl-room').textContent=t.room;
  document.getElementById('opt-room').textContent='— '+t.select_room.replace('— ','').replace(' —','')+' —';
  document.getElementById('ci-btn').textContent=t.enter;
  document.getElementById('tl-menu').textContent=t.menu;
  document.getElementById('tl-orders').textContent=t.orders;
  document.getElementById('cart-title').textContent=t.your_order;
  document.getElementById('cart-total-lbl').textContent=t.total;
  document.getElementById('cart-loc-lbl').textContent='📍 '+t.location;
  document.getElementById('cart-note-lbl').textContent=t.notes;
  document.getElementById('btn-order').textContent=t.send;
  document.getElementById('orders-title').textContent=t.my_orders;
  // Update location options
  const locSel=document.getElementById('cart-loc-sel');
  const locs=t.locs;
  const ph=locSel.options[0];
  locSel.innerHTML='';
  const phOpt=document.createElement('option');
  phOpt.value='';phOpt.textContent='— '+t.select_loc.replace('— ','').replace(' —','')+' —';
  locSel.appendChild(phOpt);
  locs.forEach((l,i)=>{
    const o=document.createElement('option');
    o.value='loc_'+i; o.dataset.it=['In camera','Piscina','Terrazza panoramica','Spa & Wellness','Giardino','Lounge bar'][i];
    o.textContent=l;
    locSel.appendChild(o);
  });
  // Room select labels
  const rw=lang==='it'?'Camera':lang==='en'?'Room':lang==='fr'?'Chambre':lang==='de'?'Zimmer':lang==='es'?'Habitación':'Kamer';
  const rSel=document.getElementById('inp-room');
  [...rSel.options].forEach((o,i)=>{if(i>0)o.textContent=rw+' '+i;});
}

/* ══ CHECK-IN ══ */
function doCheckIn(){
  const name=document.getElementById('inp-name').value.trim();
  const room=document.getElementById('inp-room').value;
  if(!name||!room){
    if(!name){const el=document.getElementById('inp-name');el.style.borderBottomColor='#c00';el.style.animation='shake 0.4s';setTimeout(()=>{el.style.borderBottomColor='';el.style.animation='';},600);}
    if(!room){const el=document.getElementById('inp-room');el.style.borderBottomColor='#c00';setTimeout(()=>el.style.borderBottomColor='',1200);}
    return;
  }
  guest={name,room,location:''};
  _roomKey=roomKey(room);
  try{localStorage.setItem('vf_guest',JSON.stringify({name,room,roomKey:_roomKey}));}catch(e){}
  function saveGuest(){
    if(!fbReady()){setTimeout(saveGuest,200);return;}
    const now=Date.now();
    const fmt=new Date(now).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    fbSet('rooms/'+_roomKey,{guest:name,lang,checkin:now,room});
    fbSet('guests/'+_roomKey,{name,room,lang,checkin:now,checkinFormatted:fmt,status:'active'});
  }
  saveGuest();
  const scr=document.getElementById('checkin-screen');
  scr.classList.add('fade-out');
  setTimeout(()=>{scr.classList.remove('visible','fade-out');launchApp();},700);
}
const _ss=document.createElement('style');
_ss.textContent='@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}';
document.head.appendChild(_ss);

/* ══ LAUNCH APP ══ */
function launchApp(){
  document.getElementById('disp-name').textContent=guest.name;
  const rn=(guest.room||'').replace(/\D/g,'');
  document.getElementById('disp-room').textContent='Camera '+rn;
  document.getElementById('cart-room-txt').textContent=guest.room;
  document.getElementById('app').classList.add('visible');
  buildCatBar();renderMenu();
}

/* ══ CATEGORY BAR ══ */
function buildCatBar(){
  const bar=document.getElementById('cat-bar');
  const labels=CAT_LABELS[lang]||CAT_LABELS.it;
  bar.innerHTML=CATS.map(c=>`<button class="cat-tab ${c===activeCat?'active':''}" onclick="setCategory('${c}')">${labels[c]||c}</button>`).join('');
}
function setCategory(c){activeCat=c;buildCatBar();renderMenu();}

/* ══ MENU ══ */
function renderMenu(){
  const list=document.getElementById('menu-list');
  const items=MENU.filter(i=>i.cat===activeCat);
  const inCart=new Set(cart.map(c=>c.id));
  list.innerHTML=items.map(item=>{
    const img=item.img?`<img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="fallback" style="display:none">${item.emoji}</div>`:
      `<div class="fallback">${item.emoji}</div>`;
    const tag=item.tag?`<span class="item-tag ${item.tag==='chef'?'tag-chef':'tag-new'}">${item.tag==='chef'?t.chef:t.newt}</span>`:'';
    const price=item.price!==null?`<span class="item-price">€ ${item.price.toFixed(2).replace('.',',')}</span>`:`<span class="item-price-na">${t.ask_sommelier}</span>`;
    const btn=item.price!==null?`<button class="add-btn ${inCart.has(item.id)?'in-cart':''}" onclick="event.stopPropagation();addToCart(${item.id})">${inCart.has(item.id)?'✓':'+'}</button>`:'';
    return `<div class="menu-item" ${item.price!==null?`onclick="addToCart(${item.id})"`:''}>
      <div class="item-img">${img}${tag}</div>
      <div class="item-body">
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.desc}</div>
        <div class="item-foot">${price}${btn}</div>
      </div>
    </div>`;
  }).join('');
}

/* ══ CART ══ */
function addToCart(id){
  const item=MENU.find(i=>i.id===id); if(!item)return;
  const ex=cart.find(c=>c.id===id);
  if(ex)ex.qty++;else cart.push({id,name:item.name,price:item.price,emoji:item.emoji,qty:1});
  updateBadge();renderMenu();renderCartItems();
  showToast(item.emoji+' '+item.name+' '+t.added);
}
function changeQty(id,d){
  id=Number(id);
  const ex=cart.find(c=>c.id===id);if(!ex)return;
  ex.qty+=d;
  if(ex.qty<=0)cart=cart.filter(c=>c.id!==id);
  updateBadge();renderMenu();renderCartItems();
}
function updateBadge(){
  const tot=cart.reduce((s,c)=>s+c.qty,0);
  const b=document.getElementById('cart-badge');
  b.textContent=tot;b.classList.toggle('hidden',tot===0);
  document.getElementById('btn-order').disabled=cart.length===0;
  updateCartTotal();
}
function updateCartTotal(){
  const tot=cart.reduce((s,c)=>s+(c.price*c.qty),0);
  document.getElementById('cart-total').textContent='€ '+tot.toFixed(2).replace('.',',');
}
function renderCartItems(){
  const el=document.getElementById('cart-items');
  if(!cart.length){el.innerHTML=`<div class="cart-empty"><span style="font-size:2.5rem;opacity:0.3">🛒</span><p>${t.empty_cart}</p></div>`;return;}
  el.innerHTML=cart.map(c=>`<div class="c-item">
    <span class="c-emoji">${c.emoji}</span>
    <div class="c-info">
      <div class="c-name">${c.name}</div>
      <div class="c-price">€ ${(c.price*c.qty).toFixed(2).replace('.',',')}${c.qty>1?` (${c.qty}×)`:''}
      </div>
    </div>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(${c.id},-1)">−</button>
      <span class="qty-val">${c.qty}</span>
      <button class="qty-btn" onclick="changeQty(${c.id},+1)">+</button>
    </div>
  </div>`).join('');
}
function toggleCart(){
  const o=document.getElementById('cart-overlay'),p=document.getElementById('cart-panel');
  const open=p.classList.contains('open');
  o.classList.toggle('open',!open);p.classList.toggle('open',!open);
  if(!open)renderCartItems();
}
function setLocation(val){
  const sel=document.getElementById('cart-loc-sel');
  const opt=sel.options[sel.selectedIndex];
  guest.location=opt?opt.dataset.it||val:val;
  document.getElementById('cart-loc-txt').textContent=val?opt.textContent:'—';
}

/* ══ PLACE ORDER ══ */
function placeOrder(){
  if(!cart.length)return;
  if(!guest.location){
    const sel=document.getElementById('cart-loc-sel');
    sel.style.borderColor='#c00';setTimeout(()=>sel.style.borderColor='',1500);
    showToast('📍 '+t.select_pos);return;
  }
  const now=new Date();
  const d=String(now.getDate()).padStart(2,'0'),m=String(now.getMonth()+1).padStart(2,'0');
  const h=String(now.getHours()).padStart(2,'0'),min=String(now.getMinutes()).padStart(2,'0');
  const order={
    id:'VF-'+d+m+'-'+h+min+'-'+Math.floor(Math.random()*900+100),
    timestamp:Date.now(),
    date:now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}),
    time:h+':'+min,
    guest:guest.name,room:guest.room,location:guest.location,lang,
    items:cart.map(c=>({id:c.id,name:c.name,qty:c.qty,price:c.price,emoji:c.emoji})),
    total:cart.reduce((s,c)=>s+(c.price*c.qty),0),
    note:document.getElementById('cart-note').value.trim()||'',
    status:'received'
  };
  orders.unshift(order);cart=[];
  document.getElementById('cart-note').value='';
  updateBadge();renderMenu();renderCartItems();toggleCart();
  function pushOrder(){
    if(!fbReady()){setTimeout(pushOrder,200);return;}
    fbPush('orders',order);
    fbPush('rooms/'+_roomKey+'/orders',order);
    fbUpdate('guests/'+_roomKey,{lastOrder:h+':'+min,lastOrderTS:Date.now()});
  }
  pushOrder();
  showToast(t.order_sent);
}

/* ══ ORDERS VIEW ══ */
function renderOrders(){
  const el=document.getElementById('orders-list');
  if(!orders.length){el.innerHTML=`<p style="text-align:center;padding:3rem;color:var(--gray);font-size:0.85rem">${t.my_orders}…</p>`;return;}
  const grand=orders.reduce((s,o)=>s+(o.total||0),0);
  const SL={received:t.status_received,delivered:t.status_delivered,preparing:t.status_received,delivering:t.status_received};
  el.innerHTML=orders.map(o=>`<div class="order-card">
    <div class="oc-head">
      <div><div class="oc-id">${o.id}</div><div class="oc-time">📅 ${o.date} · ⏱ ${o.time} · 📍 ${o.location}</div></div>
      <span class="oc-status ${o.status==='delivered'?'s-delivered':'s-received'}">${SL[o.status]||o.status}</span>
    </div>
    <div class="oc-items">${o.items.map(i=>`${i.emoji} ${i.name} ×${i.qty}`).join(' · ')}</div>
    ${o.note?`<div style="font-size:0.7rem;color:var(--gray);font-style:italic;margin-bottom:0.4rem">📝 ${o.note}</div>`:''}
    <div class="oc-total"><span class="oc-total-lbl">${t.order_total}</span><span class="oc-total-amt">€ ${o.total.toFixed(2).replace('.',',')}</span></div>
  </div>`).join('')+
  (orders.length>1?`<div class="orders-grand"><span class="og-lbl">${t.grand_total}</span><span class="og-amt">€ ${grand.toFixed(2).replace('.',',')}</span></div>`:'');
}

/* ══ TABS ══ */
function switchTab(tab){
  const ml=document.getElementById('menu-list'),ov=document.getElementById('orders-view');
  const cb=document.getElementById('cat-bar');
  const tm=document.getElementById('t-menu'),to=document.getElementById('t-orders');
  if(tab==='menu'){ml.style.display='';cb.style.display='';ov.classList.remove('visible');tm.classList.add('active');to.classList.remove('active');}
  else{ml.style.display='none';cb.style.display='none';ov.classList.add('visible');tm.classList.remove('active');to.classList.add('active');renderOrders();}
}

/* ══ TOAST ══ */
let _tt;
function showToast(msg,delivered=false){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast'+(delivered?' delivered':'');
  el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
